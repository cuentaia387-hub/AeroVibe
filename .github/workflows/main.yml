name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5' # Tu versión de Flutter
          channel: 'stable'
          cache: true

      - name: Generate Android project files
        run: flutter create --org com.aerovibe --project-name aerovibe .

      # ---> EL PARCHE DEFINITIVO PARA GEOLOCATOR <---
      - name: Fix gradle compileSdkVersion
        run: |
          sed -i 's/flutter\.compileSdkVersion/34/g' android/app/build.gradle
          sed -i 's/flutter\.targetSdkVersion/34/g' android/app/build.gradle
          sed -i 's/flutter\.minSdkVersion/23/g' android/app/build.gradle

      - run: flutter pub get
      
      - run: flutter build apk --release --target-platform android-arm64
      
      - uses: actions/upload-artifact@v4
        with:
          name: aerovibe-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
