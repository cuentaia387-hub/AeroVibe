name: aerovibe
description: AeroVibe — A Frutiger Aero nature weather dashboard
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Google Fonts (Nunito - closest to Frutiger typeface)
  google_fonts: ^6.2.1

  # Animations
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0

  # Blur / glassmorphism
  glass_kit: ^3.0.0

  # Icons
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Particles / Effects
  simple_animations: ^5.0.2

  # Smooth page indicator
  smooth_page_indicator: ^1.2.0+3

  # Math utils
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  # Fonts are loaded at runtime via google_fonts package.
  # To bundle fonts locally for offline APK, download Nunito from
  # https://fonts.google.com/specimen/Nunito and place .ttf files in
  # assets/fonts/, then uncomment the section below:
  #
  # fonts:
  #   - family: Nunito
  #     fonts:
  #       - asset: assets/fonts/Nunito-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Nunito-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Nunito-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Nunito-ExtraBold.ttf
  #         weight: 800
  #       - asset: assets/fonts/Nunito-Light.ttf
  #         weight: 300
